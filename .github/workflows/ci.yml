name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and Test
        run: ./gradlew build

      - name: Upload Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (Java ${{ matrix.java }})
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Spotless Check
        run: ./gradlew spotlessCheck

      - name: SpotBugs Analysis
        run: ./gradlew spotbugsMain

  dco:
    name: DCO
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO Check
        run: |
          # Check all commits in PR for Signed-off-by
          commits=$(git log --format='%H' origin/main..HEAD)
          for sha in $commits; do
            if ! git log -1 --format='%B' "$sha" | grep -q '^Signed-off-by:'; then
              echo "❌ Commit $sha is missing Signed-off-by line"
              echo "  Use: git commit -s"
              exit 1
            fi
          done
          echo "✅ All commits have Signed-off-by"
