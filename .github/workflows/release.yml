name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment:
      name: maven-central
      url: https://central.sonatype.com/artifact/io.cursus/cursus-client/${{ inputs.version }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate release version
        shell: bash
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z]+)*$ ]]; then
            echo "version must be a package version like 0.1.0 or 0.1.1-rc.1; do not include a leading v"
            exit 1
          fi

      - name: Set release version
        run: sed -i "s/version=.*/version=${{ inputs.version }}/" gradle.properties

      - name: Build
        run: ./gradlew build

      - name: Stage signed artifacts for Central Portal
        run: |
          ./gradlew \
            :cursus-client:publishMavenJavaPublicationToCentralBundleRepository \
            :cursus-spring-boot-starter:publishMavenJavaPublicationToCentralBundleRepository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create Central Portal bundle
        shell: bash
        run: |
          cd build/central-staging
          zip -r ../central-bundle.zip .

      - name: Upload bundle to Central Portal
        shell: bash
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          token=$(printf "%s:%s" "$OSSRH_USERNAME" "$OSSRH_PASSWORD" | base64 -w0)
          curl --fail --request POST \
            --header "Authorization: Bearer $token" \
            --form bundle=@build/central-bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=cursus-java-${{ inputs.version }}"

      - name: Create Git tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: Cursus Java Client v${{ inputs.version }}
          generate_release_notes: true
          files: |
            cursus-client/build/libs/*.jar
            cursus-spring-boot-starter/build/libs/*.jar
          body: |
            ## Gradle

            ```gradle
            dependencies {
                implementation "io.cursus:cursus-client:${{ inputs.version }}"
            }
            ```

            Spring Boot starter:

            ```gradle
            dependencies {
                implementation "io.cursus:cursus-spring-boot-starter:${{ inputs.version }}"
            }
            ```

            ## Maven

            ```xml
            <dependency>
              <groupId>io.cursus</groupId>
              <artifactId>cursus-client</artifactId>
              <version>${{ inputs.version }}</version>
            </dependency>
            ```

            Spring Boot starter:

            ```xml
            <dependency>
              <groupId>io.cursus</groupId>
              <artifactId>cursus-spring-boot-starter</artifactId>
              <version>${{ inputs.version }}</version>
            </dependency>
            ```

            ## Compatibility

            - Java 17 or later.
            - Java 21 or later is recommended for virtual-thread execution.
            - Requires a running Cursus broker.

            ## Links

            - Maven Central core client: https://central.sonatype.com/artifact/io.cursus/cursus-client/${{ inputs.version }}
            - Maven Central Spring Boot starter: https://central.sonatype.com/artifact/io.cursus/cursus-spring-boot-starter/${{ inputs.version }}
            - Documentation: https://github.com/cursus-io/cursus-java#readme
